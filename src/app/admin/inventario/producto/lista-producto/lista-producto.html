<div class="grid-container">
    <mat-card>
        <h1>Lista Productos</h1>
        <div class="mat-elevation-z8">
            <mat-form-field>
                <mat-label>Filter</mat-label>
                <input matInput placeholder="Filtro">
            </mat-form-field>


            <table mat-table [dataSource]="lista_productos()" matSort>

                <ng-container matColumnDef="id">
                    <th mat-header-cell *matHeaderCellDef>id.</th>
                    <td mat-cell *matCellDef="let element">{{ element.id }}</td>
                </ng-container>

                <ng-container matColumnDef="nombre">
                    <th mat-header-cell *matHeaderCellDef>Nombre.</th>
                    <td mat-cell *matCellDef="let element">{{ element.nombre }}</td>
                </ng-container>

                <ng-container matColumnDef="precio">
                    <th mat-header-cell *matHeaderCellDef>Precio</th>
                    <td mat-cell *matCellDef="let element">{{ element.precio_venta_actual }}</td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
            </table>

            <mat-paginator [length]="total()" [pageSizeOptions]="[3, 5, 10, 25, 50]" [pageSize]="3" showFirstLastButtons aria-label="Select page">
            </mat-paginator>
        </div>

    </mat-card>

</div>


<table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>NOMBRE</th>
            <th>precio_venta_actual</th>
            <th>imagen</th>
            <th>Acción</th>
        </tr>
    </thead>
    <tbody>
        @for (prod of lista_productos(); track $index) {
            <tr>
                <td>{{ prod.id }}</td>
                <td>{{ prod.nombre }}</td>
                <td>{{ prod.precio_venta_actual }}</td>
                <td>
                    <img [src]="`http://127.0.0.1:5000/${prod.imagen}`" alt="">
                </td>
                <td></td>
            </tr>

        }
    </tbody>
</table>
