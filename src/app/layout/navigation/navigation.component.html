<mat-sidenav-container class="sidenav-container">
  <mat-sidenav
    #drawer
    class="sidenav"
    fixedInViewport
    [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
    [mode]="(isHandset$ | async) ? 'over' : 'side'"
    [opened]="(isHandset$ | async) === false"
  >
    <mat-toolbar>Mi Empresa</mat-toolbar>
    <mat-nav-list>
      <a mat-list-item routerLink="/admin" >ADMINISTRACIÓN</a>
      <a mat-list-item routerLink="/admin/perfil" >PERFIL</a>
      <a mat-list-item routerLink="/admin/usuarios" >USUARIOS</a>
    </mat-nav-list>
    

    <mat-expansion-panel [class.mat-elevation-z0]="true">
      <mat-expansion-panel-header>
       <mat-icon>dashboard</mat-icon> Inventarios
      </mat-expansion-panel-header>
      <mat-nav-list>
        <a mat-list-item routerLink="/admin/categoria" >Categoria</a>
        <a mat-list-item routerLink="/admin/producto" >Productos</a>
        <a mat-list-item routerLink="/admin/sucursal" >Sucursal</a>
        <a mat-list-item routerLink="/admin/almacen" >Almacen</a>
      </mat-nav-list>

    </mat-expansion-panel>
  </mat-sidenav>
  <mat-sidenav-content>
    <mat-toolbar color="primary">

      
        <button type="button" class="menu-boton" aria-label="Toggle sidenav" matIconButton (click)="drawer.toggle()">
          <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
        </button>
     
      <span>Mi Empresa</span>
    </mat-toolbar>
    <!-- Add Content Here -->
     <router-outlet />

  </mat-sidenav-content>
</mat-sidenav-container>
